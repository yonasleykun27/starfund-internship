<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StarFund Internship - Exercise 8: Dynamic 'Load More' pagination for startup campaigns.">
    <title>Exercise 8: Dynamic Load More Pagination</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --accent-success: #10b981;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        /* Startup Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            text-align: left;
        }

        /* Startup Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: cardEntrance 0.5s ease forwards;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 320px;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.2);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.08);
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .sector-badge {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .funding-raised {
            font-size: 0.8rem;
            color: var(--accent-success);
            font-weight: 600;
        }

        .card-body h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .card-body p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: auto;
        }

        .progress-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }

        .progress-bar-bg {
            background-color: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent-primary), #6366f1);
            height: 100%;
            border-radius: 100px;
            width: 0%;
            transition: width 1s ease-out;
        }

        /* Skeleton Loader Cards */
        .skeleton-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            height: 320px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .skeleton-block {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: loadingSkeleton 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes loadingSkeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Load More Button styling */
        .load-more-wrapper {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        button.btn-load {
            padding: 0.9rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button.btn-load:hover:not(:disabled) {
            border-color: var(--accent-primary);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        button.btn-load:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 2px solid var(--accent-primary);
            width: 14px;
            height: 14px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .counter-badge {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .back-nav {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }

        .back-nav:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Explore Campaigns</h1>
        <p class="subtitle">Support innovative founders building tomorrow's technologies. Use the dynamic pagination below to load more campaigns from our database.</p>

        <div class="grid-container" id="gridContainer">
            <!-- Cards will be dynamically appended here -->
        </div>

        <div class="load-more-wrapper">
            <button class="btn-load" id="loadMoreBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Load More Campaigns</span>
            </button>
            <div class="counter-badge" id="counterBadge">Showing 0 of 0 campaigns</div>
        </div>

        <a href="day10-landing.html" class="back-nav">← Back to Week 2 Overview</a>
    </div>

    <script>
        // Mock Campaign Database
        const mockCampaignsDb = [
            { id: 1, name: "AeroDrones", sector: "Aerospace", desc: "Building autonomous cargo drones for regional logistics networks and remote deliveries.", raised: 32000, goal: 50000 },
            { id: 2, name: "FinTech Pro", sector: "Finance", desc: "Next-generation credit scoring platform tailored for micro-businesses in emerging markets.", raised: 125000, goal: 150000 },
            { id: 3, name: "HealthAI", sector: "Healthcare", desc: "AI-powered diagnostic assistance tool detecting early cardiovascular anomalies with 98% accuracy.", raised: 45000, goal: 120000 },
            { id: 4, name: "EcoGrid", sector: "Energy", desc: "Decentralized community solar grid software offering cheaper clean energy share trading.", raised: 65000, goal: 80000 },
            { id: 5, name: "AquaPure", sector: "Environment", desc: "Low-cost graphene water purification filters for rural, off-grid communities.", raised: 15000, goal: 30000 },
            { id: 6, name: "EduGrow", sector: "Education", desc: "Gamified math and science learning platforms for primary students in localized languages.", raised: 92000, goal: 100000 },
            { id: 7, name: "RoboAgrar", sector: "Agriculture", desc: "Autonomous solar weeding robots reducing chemical pesticide usage by up to 90%.", raised: 14000, goal: 60000 },
            { id: 8, name: "SecureChain", sector: "Security", desc: "Zero-knowledge encryption layer securing enterprise cloud database systems.", raised: 175000, goal: 200000 },
            { id: 9, name: "BioPlast", sector: "Materials", desc: "100% marine-degradable packaging materials manufactured from seaweed extracts.", raised: 28000, goal: 50000 },
            { id: 10, name: "NeuroRelief", sector: "Healthcare", desc: "Wearable headband devices stimulating vagus nerve to reduce severe chronic anxiety.", raised: 88000, goal: 150000 },
            { id: 11, name: "SpaceLink", sector: "Aerospace", desc: "Compact cubesat optical communication transceivers boosting orbital throughput.", raised: 420000, goal: 500000 },
            { id: 12, name: "LogiRoute", sector: "Logistics", desc: "Reinforcement-learning route optimization layers saving fleet fuel budgets.", raised: 75000, goal: 90000 }
        ];

        // State variables
        const CARDS_PER_PAGE = 3;
        let loadedCount = 0;

        // DOM elements
        const gridContainer = document.getElementById('gridContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const counterBadge = document.getElementById('counterBadge');

        function createCardElement(data) {
            const progressPercent = Math.min(100, Math.round((data.raised / data.goal) * 100));
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="sector-badge">${data.sector}</span>
                    <span class="funding-raised">$${data.raised.toLocaleString()} raised</span>
                </div>
                <div class="card-body">
                    <h3>${data.name}</h3>
                    <p>${data.desc}</p>
                </div>
                <div class="progress-container">
                    <div class="progress-label-row">
                        <span>Funding Progress</span>
                        <span>${progressPercent}%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-${data.id}"></div>
                    </div>
                </div>
            `;

            // Trigger progress bar filling animation after rendering
            setTimeout(() => {
                const fillBar = card.querySelector(`#progress-${data.id}`);
                if (fillBar) fillBar.style.width = `${progressPercent}%`;
            }, 50);

            return card;
        }

        function renderSkeletons() {
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < CARDS_PER_PAGE; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'skeleton-card';
                skeleton.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <div class="skeleton-block" style="width: 80px; height: 18px;"></div>
                        <div class="skeleton-block" style="width: 100px; height: 18px;"></div>
                    </div>
                    <div class="skeleton-block" style="width: 140px; height: 24px; margin-top: 1rem;"></div>
                    <div class="skeleton-block" style="width: 100%; height: 60px;"></div>
                    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 0.5rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <div class="skeleton-block" style="width: 90px; height: 14px;"></div>
                            <div class="skeleton-block" style="width: 30px; height: 14px;"></div>
                        </div>
                        <div class="skeleton-block" style="width: 100%; height: 6px;"></div>
                    </div>
                `;
                fragment.appendChild(skeleton);
            }
            gridContainer.appendChild(fragment);
            return Array.from(gridContainer.querySelectorAll('.skeleton-card'));
        }

        async function loadNextPage() {
            if (loadedCount >= mockCampaignsDb.length) return;

            // Show loading states
            btnSpinner.style.display = 'inline-block';
            btnText.textContent = 'Loading...';
            loadMoreBtn.disabled = true;

            // Render skeleton placeholders
            const skeletons = renderSkeletons();

            // Simulate network latency (800ms)
            await new Promise(resolve => setTimeout(resolve, 800));

            // Remove skeletons
            skeletons.forEach(s => s.remove());

            // Fetch chunk
            const nextBatch = mockCampaignsDb.slice(loadedCount, loadedCount + CARDS_PER_PAGE);
            
            // Render actual cards
            nextBatch.forEach((data, index) => {
                const card = createCardElement(data);
                // Stagger animations slightly
                card.style.animationDelay = `${index * 0.1}s`;
                gridContainer.appendChild(card);
            });

            loadedCount += nextBatch.length;
            updateUIState();
        }

        function updateUIState() {
            counterBadge.textContent = `Showing ${loadedCount} of ${mockCampaignsDb.length} campaigns`;
            
            // Reset button loading states
            btnSpinner.style.display = 'none';
            btnText.textContent = 'Load More Campaigns';
            loadMoreBtn.disabled = false;

            // If all loaded, disable/update button
            if (loadedCount >= mockCampaignsDb.length) {
                loadMoreBtn.disabled = true;
                btnText.textContent = 'All Campaigns Loaded';
            }
        }

        loadMoreBtn.addEventListener('click', loadNextPage);

        // Initial Load on page entry
        loadNextPage();
    </script>
</body>
</html>
